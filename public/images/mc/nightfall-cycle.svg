<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160">
  <rect width="480" height="160" rx="8" fill="#1E2547"/>
  <text x="20" y="24" fill="#A0B0FF" font-size="14" font-weight="bold" font-family="sans-serif">Day / Night Cycle</text>
  
  <!-- Day bar -->
  <rect x="20" y="45" width="300" height="36" rx="4" fill="#F5D76E"/>
  <text x="30" y="62" fill="#1E2547" font-size="11" font-weight="bold" font-family="sans-serif">DAY</text>
  <text x="30" y="76" fill="#1E2547" font-size="10" font-family="sans-serif">30 minutes — safe to build &amp; explore</text>
  
  <!-- Night bar -->
  <rect x="320" y="45" width="140" height="36" rx="4" fill="#E06B8A"/>
  <text x="330" y="62" fill="#1E2547" font-size="11" font-weight="bold" font-family="sans-serif">NIGHT</text>
  <text x="330" y="76" fill="#1E2547" font-size="10" font-family="sans-serif">5 min — lethal</text>
  
  <!-- Scale -->
  <line x1="20" y1="95" x2="460" y2="95" stroke="#3A48B0" stroke-width="2"/>
  <circle cx="20" cy="95" r="4" fill="#4ECDC4"/>
  <circle cx="170" cy="95" r="4" fill="#4ECDC4"/>
  <circle cx="320" cy="95" r="4" fill="#E06B8A"/>
  <circle cx="460" cy="95" r="4" fill="#F5D76E"/>
  <text x="20" y="112" fill="#7B8CFF" font-size="9" text-anchor="middle" font-family="sans-serif">Sunrise</text>
  <text x="170" y="112" fill="#7B8CFF" font-size="9" text-anchor="middle" font-family="sans-serif">Noon</text>
  <text x="320" y="112" fill="#7B8CFF" font-size="9" text-anchor="middle" font-family="sans-serif">Sunset</text>
  <text x="460" y="112" fill="#7B8CFF" font-size="9" text-anchor="middle" font-family="sans-serif">Sunrise</text>
  
  <!-- Stats -->
  <text x="20" y="140" fill="#7B8CFF" font-size="10" font-family="sans-serif">Vanilla = 10 min / 10 min · Yuumiverse = 30 min / 5 min · 6× more day time · Nights are 2× deadlier</text>
</svg>