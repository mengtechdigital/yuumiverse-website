<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200">
  <rect width="420" height="200" rx="8" fill="#1E2547"/>
  <text x="20" y="24" fill="#A0B0FF" font-size="14" font-weight="bold" font-family="sans-serif">Power Block Values</text>
  
  <!-- Pyramid -->
  <g transform="translate(20, 40)">
    <rect x="140" y="0" width="120" height="24" rx="3" fill="#F5D76E" stroke="#2D3561" stroke-width="1"/>
    <text x="200" y="16" fill="#1E2547" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="bold">Dragon Egg — 200</text>
    
    <rect x="100" y="28" width="80" height="22" rx="3" fill="#50C878" stroke="#2D3561" stroke-width="1"/>
    <text x="140" y="43" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Beacon — 80</text>
    
    <rect x="190" y="28" width="100" height="22" rx="3" fill="#50C878" stroke="#2D3561" stroke-width="1"/>
    <text x="240" y="43" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Netherite — 50</text>
    
    <rect x="80" y="54" width="80" height="20" rx="3" fill="#4ECDC4" stroke="#2D3561" stroke-width="1"/>
    <text x="120" y="68" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Conduit — 40</text>
    
    <rect x="170" y="54" width="90" height="20" rx="3" fill="#4ECDC4" stroke="#2D3561" stroke-width="1"/>
    <text x="215" y="68" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Diamond — 4</text>
    
    <rect x="270" y="54" width="80" height="20" rx="3" fill="#4ECDC4" stroke="#2D3561" stroke-width="1"/>
    <text x="310" y="68" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Shulker — 3</text>
    
    <rect x="60" y="78" width="90" height="18" rx="3" fill="#7B8CFF" stroke="#2D3561" stroke-width="1"/>
    <text x="105" y="91" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Crying Obsidian — 2</text>
    
    <rect x="160" y="78" width="90" height="18" rx="3" fill="#7B8CFF" stroke="#2D3561" stroke-width="1"/>
    <text x="205" y="91" fill="#1E2547" font-size="9" text-anchor="middle" font-family="sans-serif">Amethyst — 1</text>
  </g>
  
  <text x="20" y="155" fill="#7B8CFF" font-size="10" font-family="sans-serif">Base power = 16 chunks · +10 per member · 1 chunk costs 1 power</text>
  <text x="20" y="172" fill="#7B8CFF" font-size="10" font-family="sans-serif">Place blocks INSIDE your claims to increase capacity. Only player-placed blocks count.</text>
  <text x="20" y="189" fill="#E06B8A" font-size="9" font-family="sans-serif">Tip: A Beacon (80) + 8 Amethyst Blocks (8) = 88 extra chunks — enough for a small town</text>
</svg>